version: "3.8"

services:
  # FastAPI Backend
  backend:
    build: .
    container_name: crypto_trading_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/crypto_trading
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - crypto_trading_network

  # PostgreSQL Database (for local development)
  db:
    image: postgres:15-alpine
    container_name: crypto_trading_db
    environment:
      POSTGRES_DB: crypto_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - crypto_trading_network

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: crypto_trading_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - crypto_trading_network

  # Celery Worker
  celery_worker:
    build: .
    container_name: crypto_trading_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/crypto_trading
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - crypto_trading_network

  # Celery Beat (Scheduler)
  celery_beat:
    build: .
    container_name: crypto_trading_celery_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/crypto_trading
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - crypto_trading_network

  # Flower (Celery monitoring)
  flower:
    build: .
    container_name: crypto_trading_flower
    command: celery -A app.tasks.celery_app flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - crypto_trading_network

volumes:
  postgres_data:
  redis_data:

networks:
  crypto_trading_network:
    driver: bridge
